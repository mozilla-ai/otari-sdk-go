name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: gofmt
        # The generated client (otari/generated) is not held to gofmt.
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go' | grep -v '^otari/generated/'))
          if [ -n "$unformatted" ]; then echo "unformatted files:"; echo "$unformatted"; exit 1; fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        # Integration tests skip automatically when no gateway is on PATH.
        run: go test ./...
