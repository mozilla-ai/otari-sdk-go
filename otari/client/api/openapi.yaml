openapi: 3.1.0
info:
  description: A clean FastAPI gateway for otari with API key management
  title: otari-gateway
  version: 0.0.0-dev
servers:
- url: /
paths:
  /health:
    get:
      description: |-
        General health check endpoint.

        Returns basic health status. For infrastructure monitoring,
        use /health/readiness or /health/liveness instead.
      operationId: health_check_health_get
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                title: Response Health Check Health Get
          description: Successful Response
      summary: Health Check
      tags:
      - health
  /health/liveness:
    get:
      description: |-
        Liveness probe endpoint.

        Simple check to verify the process is alive and responding.
        Used by Kubernetes/container orchestrators for liveness probes.

        Returns:
            Plain text "I'm alive!" message
      operationId: health_liveness_health_liveness_get
      responses:
        "200":
          content:
            application/json:
              schema:
                title: Response Health Liveness Health Liveness Get
                type: string
          description: Successful Response
      summary: Health Liveness
      tags:
      - health
  /health/readiness:
    get:
      description: |-
        Readiness probe endpoint.

        Checks if the gateway is ready to serve requests by validating:
        - Database connectivity
        - Service availability

        Used by Kubernetes/container orchestrators for readiness probes.
        Returns HTTP 503 if any dependency is unavailable.

        Returns:
            dict: Status object with health details

        Raises:
            HTTPException: 503 if service is not ready
      operationId: health_readiness_health_readiness_get
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: {}
                title: Response Health Readiness Health Readiness Get
          description: Successful Response
      summary: Health Readiness
      tags:
      - health
  /v1/audio/speech:
    post:
      description: |-
        OpenAI-compatible audio speech (TTS) endpoint.

        Authentication modes:
        - Master key + user field: Use specified user (must exist)
        - API key + user field: Use specified user (must exist)
        - API key without user field: Use virtual user created with API key
      operationId: create_speech_v1_audio_speech_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AudioSpeechRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
            audio/L16:
              schema:
                format: binary
                type: string
            audio/aac:
              schema:
                format: binary
                type: string
            audio/flac:
              schema:
                format: binary
                type: string
            audio/mpeg:
              schema:
                format: binary
                type: string
            audio/opus:
              schema:
                format: binary
                type: string
            audio/wav:
              schema:
                format: binary
                type: string
          description: Audio bytes in the requested format
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create Speech
      tags:
      - audio
  /v1/audio/transcriptions:
    post:
      description: |-
        OpenAI-compatible audio transcription endpoint.

        Authentication modes:
        - Master key + user field: Use specified user (must exist)
        - API key + user field: Use specified user (must exist)
        - API key without user field: Use virtual user created with API key
      operationId: create_transcription_v1_audio_transcriptions_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/Body_create_transcription_v1_audio_transcriptions_post"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create Transcription
      tags:
      - audio
  /v1/batches:
    get:
      description: List batches for a provider.
      operationId: list_batches_v1_batches_get
      parameters:
      - explode: true
        in: query
        name: provider
        required: true
        schema:
          title: Provider
          type: string
        style: form
      - explode: true
        in: query
        name: after
        required: false
        schema:
          description: Filter models by provider name
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          nullable: true
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Batches
      tags:
      - batches
    post:
      description: Create a batch of LLM requests for asynchronous processing.
      operationId: create_batch_v1_batches_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBatchRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create Batch
      tags:
      - batches
  /v1/batches/{batch_id}:
    get:
      description: Retrieve the status of a batch.
      operationId: retrieve_batch_v1_batches__batch_id__get
      parameters:
      - explode: false
        in: path
        name: batch_id
        required: true
        schema:
          title: Batch Id
          type: string
        style: simple
      - explode: true
        in: query
        name: provider
        required: true
        schema:
          title: Provider
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Retrieve Batch
      tags:
      - batches
  /v1/batches/{batch_id}/cancel:
    post:
      description: Cancel a batch.
      operationId: cancel_batch_v1_batches__batch_id__cancel_post
      parameters:
      - explode: false
        in: path
        name: batch_id
        required: true
        schema:
          title: Batch Id
          type: string
        style: simple
      - explode: true
        in: query
        name: provider
        required: true
        schema:
          title: Provider
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Cancel Batch
      tags:
      - batches
  /v1/batches/{batch_id}/results:
    get:
      description: Retrieve the results of a completed batch.
      operationId: retrieve_batch_results_v1_batches__batch_id__results_get
      parameters:
      - explode: false
        in: path
        name: batch_id
        required: true
        schema:
          title: Batch Id
          type: string
        style: simple
      - explode: true
        in: query
        name: provider
        required: true
        schema:
          title: Provider
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "409":
          description: Batch is not yet complete
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
        "502":
          description: LLM provider error
      summary: Retrieve Batch Results
      tags:
      - batches
  /v1/budgets:
    get:
      description: List all budgets with pagination.
      operationId: list_budgets_v1_budgets_get
      parameters:
      - explode: true
        in: query
        name: skip
        required: false
        schema:
          default: 0
          minimum: 0
          title: Skip
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          maximum: 1000
          minimum: 1
          title: Limit
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/BudgetResponse"
                title: Response List Budgets V1 Budgets Get
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Budgets
      tags:
      - budgets
    post:
      description: Create a new budget.
      operationId: create_budget_v1_budgets_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBudgetRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create Budget
      tags:
      - budgets
  /v1/budgets/{budget_id}:
    delete:
      description: Delete a budget.
      operationId: delete_budget_v1_budgets__budget_id__delete
      parameters:
      - explode: false
        in: path
        name: budget_id
        required: true
        schema:
          title: Budget Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Delete Budget
      tags:
      - budgets
    get:
      description: Get details of a specific budget.
      operationId: get_budget_v1_budgets__budget_id__get
      parameters:
      - explode: false
        in: path
        name: budget_id
        required: true
        schema:
          title: Budget Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Budget
      tags:
      - budgets
    patch:
      description: Update a budget.
      operationId: update_budget_v1_budgets__budget_id__patch
      parameters:
      - explode: false
        in: path
        name: budget_id
        required: true
        schema:
          title: Budget Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBudgetRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Update Budget
      tags:
      - budgets
  /v1/chat/completions:
    post:
      description: |-
        OpenAI-compatible chat completions endpoint.

        Supports both streaming and non-streaming responses.
        Handles reasoning content from otari providers.

        Authentication modes:
        - Master key + user field: Use specified user (must exist)
        - API key + user field: Use specified user (must exist)
        - API key without user field: Use virtual user created with API key
      operationId: chat_completions_v1_chat_completions_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletion"
          description: Chat completion
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Chat Completions
      tags:
      - chat
  /v1/embeddings:
    post:
      description: |-
        OpenAI-compatible embeddings endpoint.

        Authentication modes:
        - Master key + user field: Use specified user (must exist)
        - API key + user field: Use specified user (must exist)
        - API key without user field: Use virtual user created with API key
      operationId: create_embedding_v1_embeddings_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmbeddingRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEmbeddingResponse"
          description: Embeddings
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create Embedding
      tags:
      - embeddings
  /v1/images/generations:
    post:
      description: |-
        OpenAI-compatible image generation endpoint.

        Authentication modes:
        - Master key + user field: Use specified user (must exist)
        - API key + user field: Use specified user (must exist)
        - API key without user field: Use virtual user created with API key
      operationId: create_image_v1_images_generations_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageGenerationRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create Image
      tags:
      - images
  /v1/keys:
    get:
      description: |-
        List all API keys.

        Requires master key authentication.
      operationId: list_keys_v1_keys_get
      parameters:
      - explode: true
        in: query
        name: skip
        required: false
        schema:
          default: 0
          minimum: 0
          title: Skip
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          maximum: 1000
          minimum: 1
          title: Limit
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/KeyInfo"
                title: Response List Keys V1 Keys Get
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Keys
      tags:
      - keys
    post:
      description: |-
        Create a new API key.

        Requires master key authentication.

        If user_id is provided, the key will be associated with that user (creates user if it doesn't exist).
        If user_id is not provided, a new user will be created automatically and the key will be associated with it.
      operationId: create_key_v1_keys_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKeyRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateKeyResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create Key
      tags:
      - keys
  /v1/keys/{key_id}:
    delete:
      description: |-
        Delete (revoke) an API key.

        Requires master key authentication.
      operationId: delete_key_v1_keys__key_id__delete
      parameters:
      - explode: false
        in: path
        name: key_id
        required: true
        schema:
          title: Key Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Delete Key
      tags:
      - keys
    get:
      description: |-
        Get details of a specific API key.

        Requires master key authentication.
      operationId: get_key_v1_keys__key_id__get
      parameters:
      - explode: false
        in: path
        name: key_id
        required: true
        schema:
          title: Key Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyInfo"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Key
      tags:
      - keys
    patch:
      description: |-
        Update an API key.

        Requires master key authentication.
      operationId: update_key_v1_keys__key_id__patch
      parameters:
      - explode: false
        in: path
        name: key_id
        required: true
        schema:
          title: Key Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKeyRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyInfo"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Update Key
      tags:
      - keys
  /v1/messages:
    post:
      description: |-
        Anthropic Messages API-compatible endpoint.

        Supports MCP tool-use loops, sandboxed code execution, and SearXNG
        web_search in both standalone mode and platform mode. Platform-mode
        requests resolve credentials via the platform service and (for
        non-tool-loop requests) get multi-attempt fallback across the resolved
        route. Tool-loop requests collapse to a single attempt — once
        ``on_first_response`` lock-in plumbing lands across the codebase, a
        follow-up will enable pre-lock-in fallback for tool-loop requests too.
      operationId: create_message_v1_messages_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessagesRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: Anthropic-style message
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create Message
      tags:
      - messages
  /v1/messages/count_tokens:
    post:
      description: |-
        Anthropic ``/v1/messages/count_tokens``-compatible endpoint.

        Returns ``{"input_tokens": N}`` without contacting an upstream provider:
        counting is local, so there is no budget reservation, pricing, or usage
        logging. Authentication mirrors :func:`create_message` — platform mode
        resolves the caller's token against the platform, standalone mode validates
        the API key — so the endpoint is not an open token-counting oracle.
      operationId: count_message_tokens_v1_messages_count_tokens_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CountTokensRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountTokensResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Count Message Tokens
      tags:
      - messages
  /v1/models:
    get:
      description: |-
        List all available models.

        Returns models auto-discovered from configured providers, enriched with
        pricing data from the model_pricing table when available. Models that only
        exist in the pricing table are also included for backward compatibility.
      operationId: list_models_v1_models_get
      parameters:
      - description: Filter models by provider name
        explode: true
        in: query
        name: provider
        required: false
        schema:
          description: Filter models by provider name
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelListResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Models
      tags:
      - models
  /v1/models/{model_id}:
    get:
      description: Get details for a specific model.
      operationId: get_model_v1_models__model_id__get
      parameters:
      - explode: false
        in: path
        name: model_id
        required: true
        schema:
          title: Model Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelObject"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Model
      tags:
      - models
  /v1/moderations:
    post:
      description: |-
        OpenAI-compatible moderations endpoint.

        Authentication modes:
        - Master key + user field: Use specified user (must exist)
        - API key + user field: Use specified user (must exist)
        - API key without user field: Use virtual user created with API key
      operationId: create_moderation_v1_moderations_post
      parameters:
      - explode: true
        in: query
        name: include_raw
        required: false
        schema:
          default: false
          title: Include Raw
          type: boolean
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModerationRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModerationResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create Moderation
      tags:
      - moderations
  /v1/pricing:
    get:
      description: List all model pricing.
      operationId: list_pricing_v1_pricing_get
      parameters:
      - explode: true
        in: query
        name: skip
        required: false
        schema:
          default: 0
          minimum: 0
          title: Skip
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          maximum: 1000
          minimum: 1
          title: Limit
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/PricingResponse"
                title: Response List Pricing V1 Pricing Get
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Pricing
      tags:
      - pricing
    post:
      description: Set or update pricing for a model.
      operationId: set_pricing_v1_pricing_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPricingRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Set Pricing
      tags:
      - pricing
  /v1/pricing/{model_key}:
    delete:
      description: Delete pricing entries for a model.
      operationId: delete_pricing_v1_pricing__model_key__delete
      parameters:
      - explode: false
        in: path
        name: model_key
        required: true
        schema:
          title: Model Key
          type: string
        style: simple
      - description: ISO datetime identifying a specific pricing row to delete
        explode: true
        in: query
        name: effective_at
        required: false
        schema:
          description: ISO datetime for effective lookup
          format: date-time
          nullable: true
          type: string
        style: form
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Delete Pricing
      tags:
      - pricing
    get:
